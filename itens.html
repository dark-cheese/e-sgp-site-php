<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Itens</title>
    <link rel="stylesheet" href="fonts/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/itens.css">
    <style>
        .item-desativado { background: #F4F5F7; color: var(--cinza); }
        .status-patrimonio {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            background: var(--verde);
            color: var(--branco);
        }
        .status-patrimonio.desativado { background: var(--cinza-escuro); }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-building"></i></div>
                <div class="logo-text"><h2>e-SGP</h2></div>
            </div>

            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsaveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventarios</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Historico</a>
            </nav>

            <div class="user-info">
                <div class="user-avatar user-avatar-dynamic">--</div>
                <div>
                    <h4 class="user-name">Usuario</h4>
                    <p class="user-email" style="font-size: 11px;"></p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Itens Patrimoniais</h1>
                    <div class="breadcrumb">
                        <a href="secretarias.html">Secretarias</a>
                        <i class="fas fa-chevron-right"></i>
                        <a id="breadcrumbUnidades" href="secretarias.html">Unidades</a>
                        <i class="fas fa-chevron-right"></i>
                        <a id="breadcrumbDepartamentos" href="secretarias.html">Departamentos</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Itens</span>
                    </div>
                </div>
                <div class="action-group">
                    <button class="btn btn-primary" onclick="window.location.href='novo-item.html' + window.location.search">
                        <i class="fas fa-plus"></i> Novo
                    </button>
                </div>
            </header>

            <div class="filter-section">
                <div class="filter-row">
                    <input type="text" placeholder="Buscar por patrimonio ou descricao...">
                    <select>
                        <option>Todos os estados</option>
                        <option>Otimo</option>
                        <option>Bom</option>
                        <option>Ruim</option>
                        <option>Pessimo</option>
                    </select>
                    <button class="btn btn-primary">Filtrar</button>
                </div>
            </div>

            <div class="items-summary">
                <span><strong>Total de itens:</strong> <span id="totalItens">0</span></span>
                <span><strong>Valor total:</strong> <span id="valorTotalItens">R$ 0,00</span></span>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Patrimonio</th>
                        <th>Descricao</th>
                        <th>Departamento</th>
                        <th>Estado</th>
                        <th>Status</th>
                        <th>Responsavel</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody id="itensTableBody">
                    <tr>
                        <td colspan="7">Carregando itens...</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

    <script>
        function moeda(valor) {
            return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        async function carregarItens() {
            const params = new URLSearchParams(window.location.search);
            const secretariaId = params.get('secretariaId') || '';
            const unidadeId = params.get('unidadeId') || '';
            const departamentoId = params.get('departamentoId') || '';
            document.getElementById('breadcrumbUnidades').href = 'unidades.html?secretariaId=' + encodeURIComponent(secretariaId);
            document.getElementById('breadcrumbDepartamentos').href = 'departamentos.html?secretariaId=' + encodeURIComponent(secretariaId) + '&unidadeId=' + encodeURIComponent(unidadeId);

            const tbody = document.getElementById('itensTableBody');
            const response = await fetch(getApiBaseUrl() + '/itens.php?departamentoId=' + encodeURIComponent(departamentoId));
            const data = await response.json();
            tbody.innerHTML = '';

            if (!data.success || !data.data.length) {
                tbody.innerHTML = '<tr><td colspan="7">Nenhum patrimonio encontrado para o departamento selecionado.</td></tr>';
                return;
            }

            let total = 0;
            data.data.forEach(function (item) {
                total += Number(item.valor || 0);
                const tr = document.createElement('tr');
                const desativado = String(item.ativo) === '0';
                const statusClasse = desativado ? 'status-patrimonio desativado' : 'status-patrimonio';

                if (desativado) {
                    tr.classList.add('item-desativado');
                }

                tr.innerHTML = '<td>' + (item.numeroPatrimonio || '') + '</td>' +
                    '<td>' + (item.descricao || '') + '</td>' +
                    '<td>' + (item.departamento || '') + '</td>' +
                    '<td>' + (item.estado || '') + '</td>' +
                    '<td><span class="' + statusClasse + '">' + (item.statusPatrimonio || 'ATIVO') + '</span></td>' +
                    '<td>' + (item.responsavel || 'Sem responsavel') + '</td>' +
                    '<td><button class="action-btn"><i class="fas fa-eye"></i></button></td>';
                tbody.appendChild(tr);
            });

            document.getElementById('totalItens').textContent = data.data.length;
            document.getElementById('valorTotalItens').textContent = moeda(total);
        }

        document.addEventListener('DOMContentLoaded', carregarItens);
    </script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/utils.js"></script>
</body>
</html>
