<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Novo Departamento</title>
    
    <!-- Ícones -->
    <link rel="stylesheet" href="fonts/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-title {
            font-size: 20px;
            color: var(--azul-escuro);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-title i {
            color: var(--azul);
        }
        
        .btn-back {
            background: var(--cinza);
            color: white;
        }
        
        .btn-back:hover {
            background: var(--cinza-escuro);
        }
        
        .info-unidade {
            background: var(--cinza-claro);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        
        .info-unidade i {
            color: var(--azul);
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="logo-text">
                    <h2>e-SGP</h2>
                </div>
            </div>

            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
                
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>

            <div class="user-info">
                <div class="user-avatar user-avatar-dynamic">--</div>
                <div>
                    <h4 class="user-name">Usuário</h4>
                    <p class="user-email" style="font-size: 11px;"></p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Novo Departamento</h1>
                    <div class="breadcrumb">
                        <a href="#" id="breadcrumbVoltar">Unidades</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Novo Departamento</span>
                    </div>
                </div>
            </header>

            <div class="card form-container">
                <div class="form-title">
                    <i class="fas fa-door-open"></i>
                    <h2>Cadastrar Novo Departamento</h2>
                </div>
                
                <!-- DIV INFORMATIVA: mostra a unidade atual -->
                <div id="infoUnidade" class="info-unidade" style="display:none;">
                    <i class="fas fa-school"></i>
                    <strong>Unidade:</strong> <span id="nomeUnidade"></span>
                </div>
                
                <form onsubmit="event.preventDefault(); salvarDepartamento()">
                    <div class="form-group">
                        <label>Nome do Departamento *</label>
                        <input type="text" id="nome" placeholder="Ex: Diretoria Escolar, Almoxarifado, Biblioteca..." required>
                    </div>
                    
                    <div class="form-group">
                        <label>Unidade *</label>
                        <!-- SELECT com id="unidade" - será preenchido automaticamente -->
                        <select id="unidade" required>
                            <option value="">Selecione uma unidade...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Responsável</label>
                        <select id="responsavel">
                            <option value="">Selecione um responsável...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Descrição</label>
                        <textarea id="descricao" rows="3" placeholder="Descrição opcional do departamento"></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-back" onclick="voltarPaginaAnterior()">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        /**
         * Obtém a URL base da API
         */
        function apiBaseUrl() {
            if (typeof getApiBaseUrl === 'function') {
                return getApiBaseUrl();
            }
            var path = window.location.pathname;
            var index = path.indexOf('/frontend/');
            if (index !== -1) {
                return path.substring(0, index) + '/backend/api';
            }
            return '/backend/api';
        }

        /**
         * Função para voltar à página anterior mantendo os parâmetros da URL
         */
        function voltarPaginaAnterior() {
            const params = new URLSearchParams(window.location.search);
            const secretariaId = params.get('secretariaId');
            const unidadeId = params.get('unidadeId');
            
            if (secretariaId && unidadeId) {
                window.location.href = 'departamentos.html?secretariaId=' + encodeURIComponent(secretariaId) + '&unidadeId=' + encodeURIComponent(unidadeId);
            } else if (unidadeId) {
                window.location.href = 'departamentos.html?unidadeId=' + encodeURIComponent(unidadeId);
            } else {
                window.location.href = 'unidades.html?secretariaId=' + encodeURIComponent(secretariaId);
            }
        }

        /**
         * Carrega as opções para os selects (Unidades e Responsáveis)
         * AUTO PREENCHE a Unidade se veio um unidadeId na URL
         */
        async function carregarOpcoesDepartamento() {
    try {
        const params = new URLSearchParams(window.location.search);
        const secretariaIdParam = params.get('secretariaId');
        const unidadeIdParam = params.get('unidadeId');

        const [unidadesResponse, responsaveisResponse] = await Promise.all([
            fetch(apiBaseUrl() + '/unidades.php?secretariaId=' + encodeURIComponent(secretariaIdParam)),
            fetch(apiBaseUrl() + '/responsaveis.php')
        ]);

        const unidadesData = await unidadesResponse.json();
        const responsaveisData = await responsaveisResponse.json();

        const unidadeSelect = document.getElementById('unidade');
        const responsavelSelect = document.getElementById('responsavel');
        const infoUnidade = document.getElementById('infoUnidade');
        const nomeUnidade = document.getElementById('nomeUnidade');

        // Preenche unidades
        if (unidadesData.success) {
            unidadeSelect.innerHTML = '<option value="">Selecione uma unidade...</option>';
            unidadesData.data.forEach(function (uni) {
                const opt = document.createElement('option');
                opt.value = uni.id;
                opt.textContent = uni.nome;
                unidadeSelect.appendChild(opt);
            });

            // Auto preencher se tiver unidadeId
            if (unidadeIdParam) {
                const existe = unidadesData.data.some(u => String(u.id) === String(unidadeIdParam));
                if (existe) {
                    unidadeSelect.value = unidadeIdParam;
                    // Mostrar info
                    const unidade = unidadesData.data.find(u => String(u.id) === String(unidadeIdParam));
                    if (unidade) {
                        nomeUnidade.textContent = unidade.nome;
                        infoUnidade.style.display = 'block';
                    }
                    // unidadeSelect.disabled = true;
                } else {
                    console.warn('Unidade ID não encontrado:', unidadeIdParam);
                }
            }
        }

        // Preenche responsáveis
        if (responsaveisData.success) {
            responsaveisData.data.forEach(function (resp) {
                const opt = document.createElement('option');
                opt.value = resp.id;
                opt.textContent = resp.nome + (resp.cargo ? ' – ' + resp.cargo : '');
                responsavelSelect.appendChild(opt);
            });
        }

        // Atualiza breadcrumb
        const breadcrumb = document.getElementById('breadcrumbVoltar');
        if (unidadeIdParam && unidadesData.success) {
            const unidade = unidadesData.data.find(u => String(u.id) === String(unidadeIdParam));
            if (unidade) {
                breadcrumb.textContent = unidade.nome;
                breadcrumb.href = 'departamentos.html?secretariaId=' + encodeURIComponent(secretariaIdParam) + '&unidadeId=' + encodeURIComponent(unidadeIdParam);
            }
        } else {
            breadcrumb.textContent = 'Unidades';
            breadcrumb.href = 'unidades.html?secretariaId=' + encodeURIComponent(secretariaIdParam);
        }

    } catch (error) {
        console.error('❌ Erro em carregarOpcoesDepartamento:', error);
        alert('Erro ao carregar dados. Tente novamente.');
    }
}

                // ===== ATUALIZA BREADCRUMB =====
                const breadcrumbVoltar = document.getElementById('breadcrumbVoltar');
                if (unidadeIdParam) {
                    const unidadeEncontrada = unidadesData.data.find(u => u.id == unidadeIdParam);
                    if (unidadeEncontrada) {
                        breadcrumbVoltar.textContent = unidadeEncontrada.nome;
                        breadcrumbVoltar.href = 'departamentos.html?secretariaId=' + encodeURIComponent(secretariaIdParam) + '&unidadeId=' + encodeURIComponent(unidadeIdParam);
                    }
                } else {
                    breadcrumbVoltar.textContent = 'Unidades';
                    breadcrumbVoltar.href = 'unidades.html?secretariaId=' + encodeURIComponent(secretariaIdParam);
                }

            } catch (error) {
                console.error('❌ Erro ao carregar opções:', error);
            }
        }

        /**
         * Salva um novo departamento no banco de dados
         */
        async function salvarDepartamento() {
            const nome = document.getElementById('nome').value.trim();
            const unidadeId = document.getElementById('unidade').value;
            const responsavelId = document.getElementById('responsavel').value;

            if (!nome) {
                alert('Por favor, preencha o nome do departamento!');
                return;
            }

            if (!unidadeId) {
                alert('Por favor, selecione uma unidade!');
                return;
            }

            try {
                const response = await fetch(apiBaseUrl() + '/departamentos.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nome: nome,
                        unidadeId: unidadeId,
                        responsavelId: responsavelId
                    })
                });

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || 'Não foi possível cadastrar o departamento.');
                }

                alert(data.message);
                const params = new URLSearchParams(window.location.search);
                const secretariaId = params.get('secretariaId');
                const unidadeIdParam = params.get('unidadeId');
                
                if (secretariaId && unidadeIdParam) {
                    window.location.href = 'departamentos.html?secretariaId=' + encodeURIComponent(secretariaId) + '&unidadeId=' + encodeURIComponent(unidadeIdParam);
                } else if (unidadeIdParam) {
                    window.location.href = 'departamentos.html?unidadeId=' + encodeURIComponent(unidadeIdParam);
                } else {
                    window.location.href = 'departamentos.html';
                }
            } catch (error) {
                console.error('❌ Erro ao salvar departamento:', error);
                alert('Erro ao salvar departamento:\n' + error.message);
            }
        }

        // Quando a página carregar, executa o carregamento das opções
        document.addEventListener('DOMContentLoaded', carregarOpcoesDepartamento);
    </script>
    
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
