<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Departamento</title>
    
    <!-- Ícones -->
    <link rel="stylesheet" href="fonts/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/departamentos.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="logo-text">
                    <h2>e-SGP</h2>
                </div>
            </div>

            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
                <a href="unidades.html" class="menu-item"><i class="fas fa-school"></i> Unidades</a>
                <a href="departamentos.html" class="menu-item active"><i class="fas fa-door-open"></i> Departamentos</a>
                <a href="itens.html" class="menu-item"><i class="fas fa-boxes"></i> Patrimônio</a>
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>

            <div class="user-info">
                <div class="user-avatar user-avatar-dynamic">--</div>
                <div>
                    <h4 class="user-name">Usuário</h4>
                    <p class="user-email" style="font-size: 11px;"></p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Departamentos</h1>
                    <div class="breadcrumb"></div>
                </div>
                <button class="btn btn-primary" onclick="window.location.href='novo-departamento.html' + window.location.search">
                    <i class="fas fa-plus"></i> Novo Departamento
                </button>
            </header>

            <table>
                <thead>
                    <tr>
                        <th>Departamento</th>
                        <th>Unidade</th>
                        <th>Responsável</th>
                        <th>Itens</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                    <tbody id="departamentoTableBody">
                    <tr>
                        <td colspan="5">Carregando departamentos...</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

    <script>
        function apiBaseUrl() {
            if (typeof getApiBaseUrl === 'function') {
                return getApiBaseUrl();
            }
            var path = window.location.pathname;
            var index = path.indexOf('/frontend/');
            if (index !== -1) {
                return path.substring(0, index) + '/backend/api';
            }
            return '/backend/api';
        }

        async function carregarDepartamentos() {
            try {
                const params = new URLSearchParams(window.location.search);
                const secretariaId = params.get('secretariaId');
                const unidadeId = params.get('unidadeId');
                const response = await fetch(apiBaseUrl() + '/departamentos.php?unidadeId=' + encodeURIComponent(unidadeId));
                const data = await response.json();
                const tbody = document.getElementById('departamentoTableBody');
                tbody.innerHTML = '';

                if (!data.success) {
                    tbody.innerHTML = '<tr><td colspan="5">' + (data.message || 'Erro ao carregar departamentos.') + '</td></tr>';
                    return;
                }

                if (!data.data || data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">Nenhum departamento cadastrado.</td></tr>';
                    return;
                }

                data.data.forEach(function (departamento) {
                    const row = document.createElement('tr');
                    row.innerHTML = '<td><i class="fas fa-door-open"></i> ' + (departamento.nome || '') + '</td>' +
                        '<td>' + (departamento.unidade || '') + '</td>' +
                        '<td>' + (departamento.responsavel || 'Sem responsável') + '</td>' +
                        '<td>' + (departamento.itens || '0') + '</td>' +
                        '<td>' +
                            '<button class="action-btn" type="button"><i class="fas fa-eye"></i></button>' +
                            '<button class="action-btn"><i class="fas fa-edit"></i></button>' +
                            '<button class="action-btn"><i class="fas fa-tag"></i></button>' +
                        '</td>';
                    row.querySelector('button').addEventListener('click', function () {
                        definirContextoHierarquia({ secretariaId: secretariaId, unidadeId: unidadeId, departamentoId: departamento.id });
                        window.location.href = 'itens.html?secretariaId=' + encodeURIComponent(secretariaId) + '&unidadeId=' + encodeURIComponent(unidadeId) + '&departamentoId=' + encodeURIComponent(departamento.id);
                    });
                    tbody.appendChild(row);
                });
            } catch (error) {
                const tbody = document.getElementById('departamentoTableBody');
                tbody.innerHTML = '<tr><td colspan="5">Erro ao carregar departamentos.</td></tr>';
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', carregarDepartamentos);
    </script>

    <script src="js/main.js"></script>
    <script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
