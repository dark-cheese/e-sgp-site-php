<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Nova Unidade</title>
    
    <!-- Ícones -->
    <link rel="stylesheet" href="fonts/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-title {
            font-size: 20px;
            color: var(--azul-escuro);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-title i {
            color: var(--azul);
        }
        
        .btn-back {
            background: var(--cinza);
            color: white;
        }
        
        .btn-back:hover {
            background: var(--cinza-escuro);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="logo-text">
                    <h2>e-SGP</h2>
                </div>
            </div>

            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
               
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>

            <div class="user-info">
                <div class="user-avatar user-avatar-dynamic">--</div>
                <div>
                    <h4 class="user-name">Usuário</h4>
                    <p class="user-email" style="font-size: 11px;"></p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Nova Unidade</h1>
                    <div class="breadcrumb">
                        <!-- Breadcrumb dinâmico: será atualizado via JavaScript -->
                        <a href="#" id="breadcrumbVoltar">Secretarias</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Nova Unidade</span>
                    </div>
                </div>
            </header>

            <div class="card form-container">
                <div class="form-title">
                    <i class="fas fa-school"></i>
                    <h2>Cadastrar Nova Unidade</h2>
                </div>
                
                <form onsubmit="event.preventDefault(); salvarUnidade()">
                    <div class="form-group">
                        <label>Nome da Unidade *</label>
                        <input type="text" id="nome" placeholder="Ex: Escola Municipal Pedro Álvares" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Secretaria *</label>
                        <select id="secretaria" required>
                            <option value="">Selecione uma secretaria...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Endereço</label>
                        <input type="text" id="endereco" placeholder="Rua, número, bairro...">
                    </div>
                    
                    <div class="form-group">
                        <label>Responsável</label>
                        <select id="responsavel">
                            <option value="">Selecione um responsável...</option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <!-- Botão Voltar: chama função que preserva os parâmetros da URL -->
                        <button type="button" class="btn btn-back" onclick="voltarPaginaAnterior()">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        /**
         * Obtém a URL base da API
         */
        function apiBaseUrl() {
            if (typeof getApiBaseUrl === 'function') {
                return getApiBaseUrl();
            }
            var path = window.location.pathname;
            var index = path.indexOf('/frontend/');
            if (index !== -1) {
                return path.substring(0, index) + '/backend/api';
            }
            return '/backend/api';
        }

        /**
         * Função para voltar à página anterior mantendo os parâmetros da URL
         */
        function voltarPaginaAnterior() {
            const params = new URLSearchParams(window.location.search);
            const secretariaId = params.get('secretariaId');
            
            if (secretariaId) {
                window.location.href = 'unidades.html?secretariaId=' + encodeURIComponent(secretariaId);
            } else {
                window.location.href = 'secretarias.html';
            }
        }

        /**
         * Carrega as opções para os selects (Secretarias e Responsáveis)
         * Auto preenche a Secretaria se veio um secretariaId na URL
         * Atualiza o breadcrumb dinamicamente
         */
        async function carregarOpcoesUnidade() {
            try {
                const params = new URLSearchParams(window.location.search);
                const secretariaIdParam = params.get('secretariaId');

                console.log('🔍 Carregando opções para nova unidade');
                console.log('📌 secretariaIdParam:', secretariaIdParam);

                const [secretariasResponse, responsaveisResponse] = await Promise.all([
                    fetch(apiBaseUrl() + '/secretarias.php'),
                    fetch(apiBaseUrl() + '/responsaveis.php')
                ]);

                const secretariasData = await secretariasResponse.json();
                const responsaveisData = await responsaveisResponse.json();

                console.log('📌 secretariasData:', secretariasData);

                const secretariaSelect = document.getElementById('secretaria');
                const responsavelSelect = document.getElementById('responsavel');

                // ===== CARREGA SECRETARIAS =====
                if (secretariasData.success && secretariasData.data.length > 0) {
                    secretariaSelect.innerHTML = '<option value="">Selecione uma secretaria...</option>';
                    
                    secretariasData.data.forEach(function (sec) {
                        const opt = document.createElement('option');
                        opt.value = sec.id;
                        opt.textContent = sec.nome;
                        secretariaSelect.appendChild(opt);
                    });

                    // ===== AUTO PREENCHER: Se veio um secretariaId na URL =====
                    if (secretariaIdParam) {
                        const existe = secretariasData.data.some(s => String(s.id) === String(secretariaIdParam));
                        if (existe) {
                            secretariaSelect.value = secretariaIdParam;
                            console.log('✅ Secretaria selecionada:', secretariaSelect.value);
                        } else {
                            console.warn('⚠️ Secretaria ID não encontrado:', secretariaIdParam);
                        }
                    }
                } else {
                    console.warn('⚠️ Nenhuma secretaria encontrada');
                    secretariaSelect.innerHTML = '<option value="">Nenhuma secretaria disponível</option>';
                }

                // ===== CARREGA RESPONSÁVEIS =====
                if (responsaveisData.success && responsaveisData.data.length > 0) {
                    responsaveisData.data.forEach(function (resp) {
                        const opt = document.createElement('option');
                        opt.value = resp.id;
                        opt.textContent = resp.nome + (resp.cargo ? ' – ' + resp.cargo : '');
                        responsavelSelect.appendChild(opt);
                    });
                }

                // ===== ATUALIZA BREADCRUMB =====
                const breadcrumb = document.getElementById('breadcrumbVoltar');
                if (secretariaIdParam && secretariasData.success) {
                    const sec = secretariasData.data.find(s => String(s.id) === String(secretariaIdParam));
                    if (sec) {
                        breadcrumb.textContent = sec.nome;
                        breadcrumb.href = 'unidades.html?secretariaId=' + encodeURIComponent(secretariaIdParam);
                    } else {
                        breadcrumb.textContent = 'Secretarias';
                        breadcrumb.href = 'secretarias.html';
                    }
                } else {
                    breadcrumb.textContent = 'Secretarias';
                    breadcrumb.href = 'secretarias.html';
                }

            } catch (error) {
                console.error('❌ Erro em carregarOpcoesUnidade:', error);
                alert('Erro ao carregar dados. Tente novamente.');
            }
        }

        /**
         * Salva uma nova unidade no banco de dados
         */
        async function salvarUnidade() {
            const nome = document.getElementById('nome').value.trim();
            const secretaria = document.getElementById('secretaria').value;
            const endereco = document.getElementById('endereco').value.trim();
            const responsavel = document.getElementById('responsavel').value;

            if (!nome) {
                alert('Por favor, preencha o nome da unidade!');
                return;
            }

            if (!secretaria) {
                alert('Por favor, selecione uma secretaria!');
                return;
            }

            try {
                const response = await fetch(apiBaseUrl() + '/unidades.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nome: nome,
                        secretariaId: secretaria,
                        endereco: endereco,
                        responsavelId: responsavel
                    })
                });

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || 'Não foi possível cadastrar a unidade.');
                }

                alert(data.message);
                const params = new URLSearchParams(window.location.search);
                const secretariaId = params.get('secretariaId');
                
                if (secretariaId) {
                    window.location.href = 'unidades.html?secretariaId=' + encodeURIComponent(secretariaId);
                } else {
                    window.location.href = 'secretarias.html';
                }
            } catch (error) {
                console.error('❌ Erro ao salvar unidade:', error);
                alert('Erro ao salvar unidade:\n' + error.message);
            }
        }

        // Quando a página carregar, executa o carregamento das opções
        document.addEventListener('DOMContentLoaded', carregarOpcoesUnidade);
    </script>
    
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
