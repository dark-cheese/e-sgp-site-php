<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Nova Unidade</title>
    
    <!-- Ícones -->
    <link rel="stylesheet" href="fonts/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-title {
            font-size: 20px;
            color: var(--azul-escuro);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-title i {
            color: var(--azul);
        }
        
        .btn-back {
            background: var(--cinza);
            color: white;
        }
        
        .btn-back:hover {
            background: var(--cinza-escuro);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="logo-text">
                    <h2>e-SGP</h2>
                </div>
            </div>

            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
                <a href="unidades.html" class="menu-item active"><i class="fas fa-school"></i> Unidades</a>
                <a href="locais.html" class="menu-item"><i class="fas fa-door-open"></i> Departamentos</a>
                <a href="itens.html" class="menu-item"><i class="fas fa-boxes"></i> Patrimônio</a>
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>

            <div class="user-info">
                <div class="user-avatar">AD</div>
                <div>
                    <h4>Admin</h4>
                    <p style="font-size: 11px;">admin@prefeitura.br</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Nova Unidade</h1>
                    <div class="breadcrumb">
                        <a href="unidades.html">Unidades</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Nova Unidade</span>
                    </div>
                </div>
            </header>

            <div class="card form-container">
                <div class="form-title">
                    <i class="fas fa-school"></i>
                    <h2>Cadastrar Nova Unidade</h2>
                </div>
                
                <form onsubmit="event.preventDefault(); salvarUnidade()">
                    <div class="form-group">
                        <label>Nome da Unidade *</label>
                        <input type="text" id="nome" placeholder="Ex: Escola Municipal Pedro Álvares" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Secretaria *</label>
                        <select id="secretaria" required>
                            <option value="">Selecione uma secretaria...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Endereço</label>
                        <input type="text" id="endereco" placeholder="Rua, número, bairro...">
                    </div>
                    
                    <div class="form-group">
                        <!-- Modificado: responsavelId agora é selecionado por dropdown em vez de texto livre -->
                        <label>Responsável</label>
                        <select id="responsavel" required>
                            <option value="">Selecione um responsável...</option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-back" onclick="window.location.href='unidades.html'">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        function apiBaseUrl() {
            if (typeof getApiBaseUrl === 'function') {
                return getApiBaseUrl();
            }
            var path = window.location.pathname;
            var index = path.indexOf('/frontend/');
            if (index !== -1) {
                return path.substring(0, index) + '/backend/api';
            }
            return '/backend/api';
        }

        async function carregarOpcoesUnidade() {
            try {
                const [secretariasResponse, responsaveisResponse] = await Promise.all([
                    fetch(apiBaseUrl() + '/secretarias.php'),
                    fetch(apiBaseUrl() + '/responsaveis.php')
                ]);

                const secretariasData = await secretariasResponse.json();
                const responsaveisData = await responsaveisResponse.json();

                const secretariaSelect = document.getElementById('secretaria');
                const responsavelSelect = document.getElementById('responsavel');

                if (secretariasData.success) {
                    secretariasData.data.forEach(function (secretaria) {
                        const option = document.createElement('option');
                        option.value = secretaria.id;
                        option.textContent = secretaria.nome;
                        secretariaSelect.appendChild(option);
                    });
                }

                if (responsaveisData.success) {
                    responsaveisData.data.forEach(function (responsavel) {
                        const option = document.createElement('option');
                        option.value = responsavel.id;
                        option.textContent = responsavel.nome;
                        responsavelSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function salvarUnidade() {
            const nome = document.getElementById('nome').value.trim();
            const secretaria = document.getElementById('secretaria').value;
            const endereco = document.getElementById('endereco').value.trim();
            const responsavel = document.getElementById('responsavel').value;

            if (!nome) {
                alert('Por favor, preencha o nome da unidade!');
                return;
            }

            if (!secretaria) {
                alert('Por favor, selecione uma secretaria!');
                return;
            }

            try {
                const response = await fetch(apiBaseUrl() + '/unidades.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nome: nome,
                        secretariaId: secretaria,
                        endereco: endereco,
                        responsavelId: responsavel
                    })
                });

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || 'Não foi possível cadastrar a unidade.');
                }

                alert(data.message);
                window.location.href = 'unidades.html';
            } catch (error) {
                console.error(error);
                alert('Erro ao salvar unidade:\n' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', carregarOpcoesUnidade);
    </script>
    
    <script src="js/main.js"></script>
</body>
</html>
