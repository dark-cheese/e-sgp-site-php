<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Novo Responsável</title>
    <link rel="stylesheet" href="fonts/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .form-container {
            max-width: 700px;
            margin: 0 auto;
        }
        .form-title {
            font-size: 20px;
            color: var(--azul-escuro);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-title i {
            color: var(--azul);
        }
        .btn-back {
            background: var(--cinza);
            color: white;
        }
        .btn-back:hover {
            background: var(--cinza-escuro);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-building"></i></div>
                <div class="logo-text"><h2>e-SGP</h2></div>
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
                <a href="unidades.html" class="menu-item"><i class="fas fa-school"></i> Unidades</a>
                <a href="departamentos.html" class="menu-item"><i class="fas fa-door-open"></i> Departamentos</a>
                <a href="itens.html" class="menu-item"><i class="fas fa-boxes"></i> Patrimônio</a>
                <a href="responsaveis.html" class="menu-item active"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>
            <div class="user-info">
                <div class="user-avatar">AD</div>
                <div>
                    <h4>Admin</h4>
                    <p style="font-size: 11px;">admin@prefeitura.br</p>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Novo Responsável</h1>
                    <div class="breadcrumb">
                        <a href="responsaveis.html">Responsáveis</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Novo Responsável</span>
                    </div>
                </div>
                <div class="date-display"></div>
            </header>
            <div class="card form-container">
                <div class="form-title"><i class="fas fa-user-check"></i> Cadastrar novo responsável</div>
                <form onsubmit="event.preventDefault(); salvarResponsavel()">
                    <div class="form-row-duas-colunas">
                        <div class="form-group">
                            <label>Nome *</label>
                            <input type="text" id="nomeResponsavel" placeholder="Ex: Ana Silva" required>
                        </div>
                        <div class="form-group">
                            <label>Cargo *</label>
                            <input type="text" id="cargoResponsavel" placeholder="Ex: Responsável Patrimonial" required>
                        </div>
                    </div>
                    <div class="form-row-duas-colunas">
                        <div class="form-group">
                            <label>E-mail do Usuário Vinculado *</label>
                            <input type="email" id="emailResponsavel" placeholder="exemplo@prefeitura.br" required>
                        </div>
                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="tel" id="telefoneResponsavel" placeholder="(00) 00000-0000">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Secretaria</label>
                        <select id="secretariaResponsavel">
                            <option value="">Selecione uma secretaria...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <textarea id="observacoesResponsavel" placeholder="Observações adicionais" rows="4"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-back" onclick="window.location.href='responsaveis.html'"><i class="fas fa-arrow-left"></i> Voltar</button>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script>
        async function salvarResponsavel() {
            var nome = document.getElementById('nomeResponsavel').value.trim();
            var cargo = document.getElementById('cargoResponsavel').value.trim();
            var email = document.getElementById('emailResponsavel').value.trim();
            var telefone = document.getElementById('telefoneResponsavel').value.trim();
            var secretaria = document.getElementById('secretariaResponsavel').value;
            var observacoes = document.getElementById('observacoesResponsavel').value.trim();

            if (!nome || !cargo || !email) {
                alert('Preencha os campos obrigatórios para cadastrar o responsável.');
                return;
            }

            try {
                const response = await fetch(getApiBaseUrl() + '/responsaveis.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nome: nome,
                        cargo: cargo,
                        email: email,
                        telefone: telefone,
                        secretaria: secretaria,
                        observacoes: observacoes
                    })
                });

                if (!response.ok) {
                    throw new Error('Resposta inválida do servidor.');
                }

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || 'Não foi possível cadastrar o responsável.');
                }

                alert(data.message);
                window.location.href = 'responsaveis.html';
            } catch (error) {
                console.error(error);
                alert('Erro ao salvar responsável:\n' + error.message);
            }
        }
    </script>
    <script src="js/main.js"></script>
</body>
</html>
