<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Nova Secretaria</title>
    
    <!-- Ícones -->
    <link rel="stylesheet" href="fonts/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-title {
            font-size: 20px;
            color: var(--azul-escuro);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-title i {
            color: var(--azul);
        }
        
        .btn-back {
            background: var(--cinza);
            color: white;
        }
        
        .btn-back:hover {
            background: var(--cinza-escuro);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="logo-text">
                    <h2>e-SGP</h2>
                </div>
            </div>

            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item active"><i class="fas fa-landmark"></i> Secretarias</a>
                
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>

            <div class="user-info">
                <div class="user-avatar user-avatar-dynamic">--</div>
                <div>
                    <h4 class="user-name">Usuário</h4>
                    <p class="user-email" style="font-size: 11px;"></p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Nova Secretaria</h1>
                    <div class="breadcrumb">
                        <a href="secretarias.html">Secretarias</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Nova Secretaria</span>
                    </div>
                </div>
            </header>

            <div class="card form-container">
                <div class="form-title">
                    <i class="fas fa-landmark"></i>
                    <h2>Cadastrar Nova Secretaria</h2>
                </div>
                
                <form onsubmit="event.preventDefault(); salvarSecretaria()">
                    <div class="form-group">
                        <label>Nome da Secretaria *</label>
                        <input type="text" id="nome" placeholder="Ex: Secretaria de Educação" required>
                    </div>
                    
                    <div class="form-group">
                        <!-- Modificado: responsavelId agora é selecionado por dropdown em vez de texto livre -->
                        <label>Responsável *</label>
                        <select id="responsavel" required>
                            <option value="">Selecione um responsável...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Descrição</label>
                        <textarea rows="3" id="descricao" placeholder="Descrição da secretaria..."></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-back" onclick="window.location.href='secretarias.html'">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        function apiBaseUrl() {
            if (typeof getApiBaseUrl === 'function') {
                return getApiBaseUrl();
            }
            var path = window.location.pathname;
            var index = path.indexOf('/frontend/');
            if (index !== -1) {
                return path.substring(0, index) + '/backend/api';
            }
            return '/backend/api';
        }

        async function carregarResponsaveis() {
            try {
                const response = await fetch(apiBaseUrl() + '/responsaveis.php');
                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || 'Falha ao carregar responsáveis.');
                }

                const select = document.getElementById('responsavel');
                select.innerHTML = '<option value="">Selecione um responsável...</option>';
                data.data.forEach(function (responsavel) {
                    const option = document.createElement('option');
                    option.value = responsavel.id;
                    option.textContent = responsavel.nome + (responsavel.cargo ? ' – ' + responsavel.cargo : '');
                    select.appendChild(option);
                });
            } catch (error) {
                console.error(error);
                alert('Erro ao carregar responsáveis:\n' + error.message);
            }
        }

        async function salvarSecretaria() {
            const nome = document.getElementById('nome').value.trim();
            const responsavel = document.getElementById('responsavel').value;
            const descricao = document.getElementById('descricao').value.trim();

            if (!nome) {
                alert('Por favor, preencha o nome da secretaria!');
                return;
            }

            try {
                const response = await fetch(apiBaseUrl() + '/secretarias.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nome: nome,
                        responsavelId: responsavel,
                        descricao: descricao
                    })
                });

                if (!response.ok) {
                    throw new Error('Resposta inválida do servidor.');
                }

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || 'Não foi possível cadastrar a secretaria.');
                }

                alert(data.message);
                window.location.href = 'secretarias.html';
            } catch (error) {
                console.error(error);
                alert('Erro ao salvar secretaria:\n' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', carregarResponsaveis);
    </script>

    <script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
