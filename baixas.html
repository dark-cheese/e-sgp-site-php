<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Baixas</title>
    <link rel="stylesheet" href="fonts/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .status-baixa {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            background: var(--cinza-escuro);
            color: var(--branco);
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-building"></i></div>
                <div class="logo-text"><h2>e-SGP</h2></div>
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i><span>Secretarias</span></a>
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i><span>Responsaveis</span></a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i><span>Inventarios</span></a>
                <a href="baixas.html" class="menu-item active"><i class="fas fa-file-alt"></i><span>Baixas</span></a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i><span>Historico</span></a>
            </nav>
            <div class="user-info">
                <div class="user-avatar user-avatar-dynamic">--</div>
                <div class="user-details">
                    <h4 class="user-name">Usuario</h4>
                    <p class="user-email"></p>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Baixas</h1>
                    <div class="breadcrumb"><span>Baixas</span></div>
                </div>
                <div class="date-display"></div>
            </header>
            <div class="card">
                <div class="card-header">
                    <h2>Registros de Baixa</h2>
                    <button class="btn btn-primary" onclick="window.location.href='nova-baixa.html'">Nova Baixa</button>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Unidade</th>
                            <th>Responsavel</th>
                            <th>Status</th>
                            <th>Data</th>
                            <th>Valor</th>
                            <th>Justificativa</th>
                        </tr>
                    </thead>
                    <tbody id="baixasTableBody">
                        <tr>
                            <td colspan="7">Carregando baixas...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script>
        function apiBaseUrl() {
            if (typeof getApiBaseUrl === 'function') {
                return getApiBaseUrl();
            }
            return '/backend/api';
        }

        function moeda(valor) {
            return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        async function carregarBaixas() {
            try {
                const response = await fetch(apiBaseUrl() + '/baixas.php');
                const result = await response.json();
                const tbody = document.getElementById('baixasTableBody');
                tbody.innerHTML = '';

                if (!result.success) {
                    tbody.innerHTML = '<tr><td colspan="7">' + (result.message || 'Erro ao carregar baixas.') + '</td></tr>';
                    return;
                }

                if (!result.data || result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7">Nenhuma baixa registrada.</td></tr>';
                    return;
                }

                result.data.forEach(function (baixa) {
                    const itemLabel = baixa.itemNumero ? baixa.itemNumero + ' - ' + (baixa.itemDescricao || '') : '(sem item)';
                    const row = document.createElement('tr');
                    row.innerHTML = '<td>' + itemLabel + '</td>' +
                        '<td>' + (baixa.unidade || '') + '</td>' +
                        '<td>' + (baixa.responsavel || 'Sem responsavel') + '</td>' +
                        '<td><span class="status-baixa">' + (baixa.tipo || '') + '</span></td>' +
                        '<td>' + (baixa.dataBaixa || '') + '</td>' +
                        '<td>' + moeda(baixa.itemValor) + '</td>' +
                        '<td>' + (baixa.justificativa || '') + '</td>';
                    tbody.appendChild(row);
                });
            } catch (error) {
                const tbody = document.getElementById('baixasTableBody');
                tbody.innerHTML = '<tr><td colspan="7">Erro ao carregar baixas.</td></tr>';
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', carregarBaixas);
    </script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
