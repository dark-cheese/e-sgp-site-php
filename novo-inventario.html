<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Novo Inventário</title>
    <link rel="stylesheet" href="fonts/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .form-container {
            max-width: 700px;
            margin: 0 auto;
        }
        .form-title {
            font-size: 20px;
            color: var(--azul-escuro);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-title i {
            color: var(--azul);
        }
        .btn-back {
            background: var(--cinza);
            color: white;
        }
        .btn-back:hover {
            background: var(--cinza-escuro);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-building"></i></div>
                <div class="logo-text"><h2>e-SGP</h2></div>
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
                <a href="unidades.html" class="menu-item"><i class="fas fa-school"></i> Unidades</a>
                <a href="departamentos.html" class="menu-item"><i class="fas fa-door-open"></i> Departamentos</a>
                <a href="itens.html" class="menu-item"><i class="fas fa-boxes"></i> Patrimônio</a>
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item active"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>
            <div class="user-info">
                <div class="user-avatar">AD</div>
                <div>
                    <h4>Admin</h4>
                    <p style="font-size: 11px;">admin@prefeitura.br</p>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Novo Inventário</h1>
                    <div class="breadcrumb">
                        <a href="inventarios.html">Inventários</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Novo Inventário</span>
                    </div>
                </div>
                <div class="date-display"></div>
            </header>
            <div class="card form-container">
                <div class="form-title"><i class="fas fa-clipboard-list"></i> Cadastrar novo inventário</div>
                <form onsubmit="event.preventDefault(); salvarInventario()">
                    <div class="form-row-duas-colunas">
                        <div class="form-group">
                            <label>Nome do Inventário *</label>
                            <input type="text" id="nomeInventario" placeholder="Ex: Inventário Anual" required>
                        </div>
                        <div class="form-group">
                            <label>Ano *</label>
                            <input type="number" id="anoInventario" min="2000" max="2100" placeholder="2026" required>
                        </div>
                    </div>
                    <div class="form-row-duas-colunas">
                        <div class="form-group">
                            <label>Unidade *</label>
                            <select id="unidadeInventario" required>
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Responsável *</label>
                            <select id="responsavelInventario" required>
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row-duas-colunas">
                        <div class="form-group">
                            <label>Data de Início *</label>
                            <input type="date" id="dataInventario" required>
                        </div>
                        <div class="form-group">
                            <label>Status *</label>
                            <select id="statusInventario" required>
                                <option value="">Selecione...</option>
                                <option value="aberto">ABERTO</option>
                                <option value="concluido">CONCLUÍDO</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <textarea id="observacoesInventario" placeholder="Informações adicionais" rows="4"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-back" onclick="window.location.href='inventarios.html'"><i class="fas fa-arrow-left"></i> Voltar</button>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script>
        function salvarInventario() {
            var nome = document.getElementById('nomeInventario').value.trim();
            var ano = document.getElementById('anoInventario').value;
            var unidade = document.getElementById('unidadeInventario').value;
            var responsavel = document.getElementById('responsavelInventario').value;
            var data = document.getElementById('dataInventario').value;
            var status = document.getElementById('statusInventario').value;
            if (!nome || !ano || !unidade || !responsavel || !data || !status) {
                alert('Preencha todos os campos obrigatórios para cadastrar o inventário.');
                return;
            }
            alert('Inventário cadastrado com sucesso!');
            window.location.href = 'inventarios.html';
        }
    </script>
    <script src="js/main.js"></script>
</body>
</html>
