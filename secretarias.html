<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Secretarias</title>
    
    <!-- Ícones -->
    <link rel="stylesheet" href="fonts/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/secretarias.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="logo-text">
                    <h2>e-SGP</h2>
                </div>
            </div>

            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item active"><i class="fas fa-landmark"></i> Secretarias</a>
                <a href="unidades.html" class="menu-item"><i class="fas fa-school"></i> Unidades</a>
                <a href="locais.html" class="menu-item"><i class="fas fa-door-open"></i> Departamentos</a>
                <a href="itens.html" class="menu-item"><i class="fas fa-boxes"></i> Patrimônio</a>
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>

            <div class="user-info">
                <div class="user-avatar">AD</div>
                <div>
                    <h4>Admin</h4>
                    <p style="font-size: 11px;">admin@prefeitura.br</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Secretarias</h1>
                    <div class="breadcrumb">
                        <span>Início</span>
                        <i class="fas fa-chevron-right"></i>
                        <span>Secretarias</span>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="window.location.href='nova-secretaria.html'">
                    <i class="fas fa-plus"></i> Nova
                </button>
            </header>

            <div class="filter-section">
                <div class="filter-row">
                    <input type="text" placeholder="Buscar secretaria...">
                    <button class="btn btn-primary">Buscar</button>
                </div>
            </div>

            <div class="stats-summary">
                <div class="card">
                    <div class="stat-number">6</div>
                    <p>Total de Secretarias</p>
                </div>
                <div class="card">
                    <div class="stat-number">28</div>
                    <p>Unidades</p>
                </div>
                <div class="card">
                    <div class="stat-number">1.234</div>
                    <p>Itens</p>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Secretaria</th>
                        <th>Unidades</th>
                        <th>Itens</th>
                        <th>Responsável</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="secretariasTableBody">
                    <tr><td colspan="5">Carregando secretarias...</td></tr>
                </tbody>
            </table>

            <div class="pagination">
                <button class="page-btn"><i class="fas fa-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
        </main>
    </div>

    <script>
        function apiBaseUrl() {
            if (typeof getApiBaseUrl === 'function') {
                return getApiBaseUrl();
            }
            var path = window.location.pathname;
            var index = path.indexOf('/frontend/');
            if (index !== -1) {
                return path.substring(0, index) + '/backend/api';
            }
            return '/backend/api';
        }

        async function carregarSecretarias() {
            try {
                const response = await fetch(apiBaseUrl() + '/secretarias.php');
                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || 'Falha ao carregar secretarias.');
                }

                const tbody = document.getElementById('secretariasTableBody');
                tbody.innerHTML = '';

                data.data.forEach(function (secretaria) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><i class="fas fa-landmark" style="color: var(--azul); margin-right: 8px;"></i> ${secretaria.nome}</td>
                        <td>${secretaria.unidades}</td>
                        <td>${secretaria.itens}</td>
                        <td>${secretaria.responsavel || 'Sem responsável'}</td>
                        <td>
                            <button class="action-btn" onclick="window.location.href='unidades.html'"><i class="fas fa-eye"></i></button>
                            <button class="action-btn"><i class="fas fa-edit"></i></button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                const totalCard = document.querySelector('.stats-summary .card .stat-number');
                if (totalCard) {
                    totalCard.textContent = data.data.length;
                }
            } catch (error) {
                console.error(error);
                alert('Erro ao carregar secretarias:\n' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', carregarSecretarias);
    </script>

    <script src="js/main.js"></script>
    <script src="js/utils.js"></script>
</body>
</html>
