<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Histórico</title>
    <link rel="stylesheet" href="fonts/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-building"></i></div>
                <div class="logo-text">
                    <h2>e-SGP</h2>
                </div>
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i><span>Secretarias</span></a>
                
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i><span>Responsáveis</span></a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i><span>Inventários</span></a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i><span>Baixas</span></a>
                <a href="historicos.html" class="menu-item active"><i class="fas fa-history"></i><span>Histórico</span></a>
            </nav>
            <div class="user-info">
                <div class="user-avatar user-avatar-dynamic">--</div>
                <div class="user-details">
                    <h4 class="user-name">Usuário</h4>
                    <p class="user-email"></p>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Histórico</h1>
                    <div class="breadcrumb"><span>Histórico</span></div>
                </div>
                <div class="date-display"></div>
            </header>
            <div class="card"> 
                <div class="card-header">
                    <h2>Registro de Ações</h2>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Usuário</th>
                            <th>Ação</th>
                            <th>Tabela</th>
                            <th>ID</th>
                            <th>Descrição</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="historicoTableBody">
                        <tr>
                            <td colspan="6">Carregando histórico...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script>
        function apiBaseUrl() {
            if (typeof getApiBaseUrl === 'function') {
                return getApiBaseUrl();
            }
            var path = window.location.pathname;
            var index = path.indexOf('/frontend/');
            if (index !== -1) {
                return path.substring(0, index) + '/backend/api';
            }
            return '/backend/api';
        }

        async function carregarHistorico() {
            try {
                const response = await fetch(apiBaseUrl() + '/historicos.php');
                const result = await response.json();
                const tbody = document.getElementById('historicoTableBody');
                tbody.innerHTML = '';

                if (!result.success) {
                    tbody.innerHTML = '<tr><td colspan="6">' + (result.message || 'Erro ao carregar histórico.') + '</td></tr>';
                    return;
                }

                if (!result.data || result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">Nenhum histórico encontrado.</td></tr>';
                    return;
                }

                result.data.forEach(function (registro) {
                    const row = document.createElement('tr');
                    row.innerHTML = '<td>' + (registro.usuario || 'Desconhecido') + '</td>' +
                        '<td>' + (registro.acao || '') + '</td>' +
                        '<td>' + (registro.tabelaAlvo || '') + '</td>' +
                        '<td>' + (registro.registroId || '') + '</td>' +
                        '<td>' + (registro.descricao || '') + '</td>' +
                        '<td>' + (registro.dataRegistro || '') + '</td>';
                    tbody.appendChild(row);
                });
            } catch (error) {
                const tbody = document.getElementById('historicoTableBody');
                tbody.innerHTML = '<tr><td colspan="6">Erro ao carregar histórico.</td></tr>';
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', carregarHistorico);
    </script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
