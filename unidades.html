<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Unidades</title>
    
    <!-- Ícones -->
    <link rel="stylesheet" href="fonts/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/unidades.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="logo-text">
                    <h2>e-SGP</h2>
                </div>
            </div>

            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>

            <div class="user-info">
                <div class="user-avatar user-avatar-dynamic">--</div>
                <div>
                    <h4 class="user-name">Usuário</h4>
                    <p class="user-email" style="font-size: 11px;"></p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Unidades</h1>
                    <div class="breadcrumb">
                        <a href="secretarias.html">Secretarias</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Unidades</span>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="window.location.href='nova-unidade.html' + window.location.search">
                    <i class="fas fa-plus"></i> Nova
                </button>
            </header>

            <div class="filter-section">
                <div class="filter-row">
                    <input type="text" id="buscarUnidade" placeholder="Buscar unidade...">
                    <button class="btn btn-primary">Filtrar</button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Unidade</th>
                        <th>Secretaria</th>
                        <th>Departamentos</th>
                        <th>Itens</th>
                        <th>Responsável</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="unidadeTableBody">
                    <tr>
                        <td colspan="6">Carregando unidades...</td>
                    </tr>
                </tbody>
            </table>

        </main>
    </div>

    <script>
        function contexto() { return new URLSearchParams(window.location.search); }
        async function carregarUnidades() {
            const params = new URLSearchParams(window.location.search);
            const secretariaId = params.get('secretariaId');
            const tbody = document.getElementById('unidadeTableBody');
            
            try {
                const response = await fetch(apiBaseUrl() + '/unidades.php?secretariaId=' + encodeURIComponent(secretariaId));
                const data = await response.json();
                tbody.innerHTML = '';
                
                if (!data.success || !data.data.length) {
                    tbody.innerHTML = '<tr><td colspan="6">Nenhuma unidade encontrada para a secretaria selecionada.</td></tr>';
                    return;
                }
                
                data.data.forEach(function (unidade) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = 
                        '<td><i class="fas fa-school"></i> ' + (unidade.nome || '') + '</td>' +
                        '<td>' + (unidade.secretaria || '') + '</td>' +
                        '<td>' + (unidade.departamentos || 0) + '</td>' +
                        '<td>' + (unidade.itens || 0) + '</td>' +
                        '<td>' + (unidade.responsavel || 'Sem responsável') + '</td>' +
                        // ===== CORREÇÃO: Passa secretariaId E unidadeId =====
                        '<td><button class="action-btn" onclick="window.location.href=\'departamentos.html?secretariaId=' + encodeURIComponent(secretariaId) + '&unidadeId=' + encodeURIComponent(unidade.id) + '\'"><i class="fas fa-eye"></i></button></td>';
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Erro ao carregar unidades:', error);
                tbody.innerHTML = '<tr><td colspan="6">Erro ao carregar unidades.</td></tr>';
            }
        }
        document.addEventListener('DOMContentLoaded', carregarUnidades);
    </script>
    <script src="js/main.js"></script>
    <script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
