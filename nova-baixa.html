<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Nova Baixa</title>
    <link rel="stylesheet" href="fonts/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .form-container {
            max-width: 700px;
            margin: 0 auto;
        }
        .form-title {
            font-size: 20px;
            color: var(--azul-escuro);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-title i {
            color: var(--azul);
        }
        .btn-back {
            background: var(--cinza);
            color: white;
        }
        .btn-back:hover {
            background: var(--cinza-escuro);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-building"></i></div>
                <div class="logo-text"><h2>e-SGP</h2></div>
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
                <a href="unidades.html" class="menu-item"><i class="fas fa-school"></i> Unidades</a>
                <a href="locais.html" class="menu-item"><i class="fas fa-door-open"></i> Departamentos</a>
                <a href="itens.html" class="menu-item"><i class="fas fa-boxes"></i> Patrimônio</a>
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item active"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>
            <div class="user-info">
                <div class="user-avatar">AD</div>
                <div>
                    <h4>Admin</h4>
                    <p style="font-size: 11px;">admin@prefeitura.br</p>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Nova Baixa</h1>
                    <div class="breadcrumb">
                        <a href="baixas.html">Baixas</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Nova Baixa</span>
                    </div>
                </div>
                <div class="date-display"></div>
            </header>
            <div class="card form-container">
                <div class="form-title"><i class="fas fa-file-alt"></i> Registrar nova baixa</div>
                <form onsubmit="event.preventDefault(); salvarBaixa()">
                    <div class="form-row-duas-colunas">
                        <div class="form-group">
                            <label>Item *</label>
                            <input type="text" id="itemBaixa" placeholder="Ex: Computador Desktop" required>
                        </div>
                        <div class="form-group">
                            <label>Tipo de Baixa *</label>
                            <select id="tipoBaixa" required>
                                <option value="">Selecione...</option>
                                <option value="doacao">DOAÇÃO</option>
                                <option value="perda">PERDA</option>
                                <option value="descarte">DESCARTADA</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row-duas-colunas">
                        <div class="form-group">
                            <label>Data *</label>
                            <input type="date" id="dataBaixa" required>
                        </div>
                        <div class="form-group">
                            <label>Quantidade *</label>
                            <input type="number" id="quantidadeBaixa" min="1" value="1" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Justificativa *</label>
                        <textarea id="justificativaBaixa" placeholder="Motivo da baixa" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <textarea id="observacoesBaixa" placeholder="Notas adicionais" rows="3"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-back" onclick="window.location.href='baixas.html'"><i class="fas fa-arrow-left"></i> Voltar</button>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script>
        function salvarBaixa() {
            var item = document.getElementById('itemBaixa').value.trim();
            var tipo = document.getElementById('tipoBaixa').value;
            var data = document.getElementById('dataBaixa').value;
            var quantidade = document.getElementById('quantidadeBaixa').value;
            var justificativa = document.getElementById('justificativaBaixa').value.trim();
            if (!item || !tipo || !data || !quantidade || !justificativa) {
                alert('Preencha todos os campos obrigatórios para registrar a baixa.');
                return;
            }
            alert('Baixa registrada com sucesso!');
            window.location.href = 'baixas.html';
        }
    </script>
    <script src="js/main.js"></script>
</body>
</html>
