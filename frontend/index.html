<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Login</title>
    
    <!-- Ícones -->
    <link rel="stylesheet" href="../fonts/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-login">
                <div class="logo-icon-large">
                    <i class="fas fa-building"></i>
                </div>
                <h1>e-SGP</h1>
                <div class="subtitle">
                    <span>Sistema de Gestão de Patrimônio</span>
                </div>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label>E-mail</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" onclick="toggleSenha()"></i>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" checked> Lembrar
                    </label>
                    <a href="#" class="forgot-password">Esqueceu?</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>

            <div class="login-info">
                <p>Acesso de demonstração:</p>
                <div class="demo-credentials">
                    <strong>admin@prefeitura.br</strong> / <strong>admin123</strong>
                </div>
            </div>
        </div>

        <div class="footer-login">
            <p>© 2026 e-SGP - Projeto Integrador</p>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
</body>
</html>
