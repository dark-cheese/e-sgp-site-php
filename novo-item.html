<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Novo Item</title>
    
    <!-- Ícones -->
    <link rel="stylesheet" href="fonts/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/novo-item.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="logo-text">
                    <h2>e-SGP</h2>
                </div>
            </div>

            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
                <a href="unidades.html" class="menu-item"><i class="fas fa-school"></i> Unidades</a>
                <a href="departamentos.html" class="menu-item"><i class="fas fa-door-open"></i> Departamentos</a>
                <a href="itens.html" class="menu-item active"><i class="fas fa-boxes"></i> Patrimônio</a>
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>

            <div class="user-info">
                <div class="user-avatar">AD</div>
                <div>
                    <h4>Admin</h4>
                    <p style="font-size: 11px;">admin@prefeitura.br</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Novo Item</h1>
                    <div class="breadcrumb">
                        <a href="itens.html">Patrimônio</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Novo Item</span>
                    </div>
                </div>
            </header>

            <div class="card">
                <form onsubmit="event.preventDefault(); salvarItem()">
                    <!-- Dados Básicos -->
                    <div class="form-section">
                        <h3><i class="fas fa-info-circle"></i> Dados Básicos</h3>
                        
                        <div class="form-group">
                            <label>Nº Patrimônio</label>
                            <input type="text" value="Gerado automaticamente" class="readonly-field" readonly>
                        </div>
                        
                        <div class="form-group">
                            <label>Descrição <span style="color: var(--vermelho);">*</span></label>
                            <input type="text" id="descricao" placeholder="Ex: Computador Desktop" required>
                        </div>
                        
                        <div class="form-row-tres-colunas">
                            <div class="form-group">
                                <label>Marca</label>
                                <input id="marca" type="text" placeholder="Ex: Dell">
                            </div>
                            <div class="form-group">
                                <label>Modelo</label>
                                <input id="modelo" type="text" placeholder="Ex: Optiplex">
                            </div>
                            <div class="form-group">
                                <label>Nº Série</label>
                                <input id="numeroSerie" type="text" placeholder="Ex: 123ABC">
                            </div>
                        </div>
                        
                        <!-- Modificado: adicionado tipoMaterialId para o novo modelo de item -->
                        <div class="form-row-duas-colunas">
                            <div class="form-group">
                                <label>Tipo de Material <span style="color: var(--vermelho);">*</span></label>
                                <select id="tipoMaterialId" required>
                                    <option value="">Selecione...</option>
                                    <option value="1" selected>Permanente</option>
                                    <option value="2">Consumo</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Estado <span style="color: var(--vermelho);">*</span></label>
                                <select id="estado" required>
                                    <option value="">Selecione...</option>
                                    <option value="otimo">Ótimo</option>
                                    <option value="bom">Bom</option>
                                    <option value="ruim">Ruim</option>
                                    <option value="péssimo">Péssimo</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row-duas-colunas">
                            <div class="form-group">
                                <label>Observações</label>
                                <input id="observacoes" type="text" placeholder="Observações relevantes">
                            </div>
                        </div>
                    </div>

                    <!-- Localização -->
                    <div class="form-section">
                        <h3><i class="fas fa-map-marker-alt"></i> Localização</h3>
                        
                        <!-- Modificado: agora o item deve apontar para departamentoId e localizacaoId -->
                        <div class="form-row-duas-colunas">
                            <div class="form-group">
                                <label>Secretaria <span style="color: var(--vermelho);">*</span></label>
                                <select id="secretariaId" required>
                                    <option value="">Selecione...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Unidade <span style="color: var(--vermelho);">*</span></label>
                                <select id="unidadeId" required>
                                    <option value="">Selecione...</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row-duas-colunas">
                            <div class="form-group">
                                <label>Departamento <span style="color: var(--vermelho);">*</span></label>
                                <select id="departamentoId" required>
                                    <option value="">Selecione...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Localização</label>
                                <select id="localizacaoId">
                                    <option value="">Nenhuma localização</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row-duas-colunas">
                            <div class="form-group">
                                <label>Responsável <span style="color: var(--vermelho);">*</span></label>
                                <select id="responsavelId" required>
                                    <option value="">Selecione...</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Aquisição -->
                    <div class="form-section">
                        <h3><i class="fas fa-file-invoice"></i> Aquisição</h3>
                        
                        <div class="form-row-tres-colunas">
                            <div class="form-group">
                                <label>Data Aquisição</label>
                                <input id="dataAquisicao" type="date">
                            </div>
                            <div class="form-group">
                                <label>Valor (R$)</label>
                                <input id="valor" type="number" step="0.01" placeholder="0,00">
                            </div>
                            <div class="form-group">
                                <label>Nº Nota Fiscal</label>
                                <input id="notaFiscal" type="text" placeholder="NF-2026-001">
                            </div>
                        </div>
                    </div>

                    <!-- Anexos -->
                    <div class="form-section">
                        <h3><i class="fas fa-paperclip"></i> Anexos</h3>
                        
                        <div class="upload-area" onclick="alert('Upload de imagem')">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p><strong>Clique para adicionar foto</strong></p>
                            <p style="color: var(--cinza); font-size: 12px;">PNG, JPG até 5MB</p>
                        </div>
                    </div>

                    <!-- Botões -->
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" onclick="window.location.href='itens.html'">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar Item</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/utils.js"></script>
</body>
</html>
