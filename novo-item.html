<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-SGP - Novo Item</title>
    
    <!-- Ícones -->
    <link rel="stylesheet" href="fonts/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/novo-item.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="logo-text">
                    <h2>e-SGP</h2>
                </div>
            </div>

            <nav class="menu">
                <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="secretarias.html" class="menu-item"><i class="fas fa-landmark"></i> Secretarias</a>
                
                <a href="responsaveis.html" class="menu-item"><i class="fas fa-user-check"></i> Responsáveis</a>
                <a href="inventarios.html" class="menu-item"><i class="fas fa-clipboard-list"></i> Inventários</a>
                <a href="baixas.html" class="menu-item"><i class="fas fa-file-alt"></i> Baixas</a>
                <a href="historicos.html" class="menu-item"><i class="fas fa-history"></i> Histórico</a>
            </nav>

            <div class="user-info">
                <div class="user-avatar user-avatar-dynamic">--</div>
                <div>
                    <h4 class="user-name">Usuário</h4>
                    <p class="user-email" style="font-size: 11px;"></p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Novo Item</h1>
                    <div class="breadcrumb">
                        <a href="itens.html">Patrimônio</a>
                        <i class="fas fa-chevron-right"></i>
                        <span>Novo Item</span>
                    </div>
                </div>
            </header>

            <div class="card">
                <form onsubmit="event.preventDefault(); salvarItem()">
                    <!-- Dados Básicos -->
                    <div class="form-section">
                        <h3><i class="fas fa-info-circle"></i> Dados Básicos</h3>
                        
                        <div class="form-group">
                            <label>Nº Patrimônio</label>
                            <input type="text" value="Gerado automaticamente" class="readonly-field" readonly>
                        </div>
                        
                        <div class="form-group">
                            <label>Descrição <span style="color: var(--vermelho);">*</span></label>
                            <input type="text" id="descricao" placeholder="Ex: Computador Desktop" required>
                        </div>
                        
                        <div class="form-row-tres-colunas">
                            <div class="form-group">
                                <label>Marca</label>
                                <input id="marca" type="text" placeholder="Ex: Dell">
                            </div>
                            <div class="form-group">
                                <label>Modelo</label>
                                <input id="modelo" type="text" placeholder="Ex: Optiplex">
                            </div>
                            <div class="form-group">
                                <label>Nº Série</label>
                                <input id="numeroSerie" type="text" placeholder="Ex: 123ABC">
                            </div>
                        </div>
                        
                        <!-- Modificado: adicionado tipoMaterialId para o novo modelo de item -->
                        <div class="form-row-duas-colunas">
                            <div class="form-group">
                                <label>Tipo de Material <span style="color: var(--vermelho);">*</span></label>
                                <select id="tipoMaterialId" required>
                                    <option value="">Selecione...</option>
                                    <option value="1" selected>Permanente</option>
                                    <option value="2">Consumo</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Estado <span style="color: var(--vermelho);">*</span></label>
                                <select id="estado" required>
                                    <option value="">Selecione...</option>
                                    <option value="otimo">Ótimo</option>
                                    <option value="bom">Bom</option>
                                    <option value="ruim">Ruim</option>
                                    <option value="péssimo">Péssimo</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row-duas-colunas">
                            <div class="form-group">
                                <label>Observações</label>
                                <input id="observacoes" type="text" placeholder="Observações relevantes">
                            </div>
                        </div>
                    </div>

                    <!-- Localização -->
                    <div class="form-section">
                        <h3><i class="fas fa-map-marker-alt"></i> Localização</h3>
                        
                        <!-- Modificado: agora o item deve apontar para departamentoId e localizacaoId -->
                        <div class="form-row-duas-colunas">
                            <div class="form-group">
                                <label>Secretaria <span style="color: var(--vermelho);">*</span></label>
                                <select id="secretariaId" required>
                                    <option value="">Selecione...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Unidade <span style="color: var(--vermelho);">*</span></label>
                                <select id="unidadeId" required>
                                    <option value="">Selecione...</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row-duas-colunas">
                            <div class="form-group">
                                <label>Departamento <span style="color: var(--vermelho);">*</span></label>
                                <select id="departamentoId" required>
                                    <option value="">Selecione...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Localização</label>
                                <select id="localizacaoId">
                                    <option value="">Nenhuma localização</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row-duas-colunas">
                            <div class="form-group">
                                <label>Responsável <span style="color: var(--vermelho);">*</span></label>
                                <select id="responsavelId" required>
                                    <option value="">Selecione...</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Aquisição -->
                    <div class="form-section">
                        <h3><i class="fas fa-file-invoice"></i> Aquisição</h3>
                        
                        <div class="form-row-tres-colunas">
                            <div class="form-group">
                                <label>Data Aquisição</label>
                                <input id="dataAquisicao" type="date">
                            </div>
                            <div class="form-group">
                                <label>Valor (R$)</label>
                                <input id="valor" type="number" step="0.01" placeholder="0,00">
                            </div>
                            <div class="form-group">
                                <label>Nº Nota Fiscal</label>
                                <input id="notaFiscal" type="text" placeholder="NF-2026-001">
                            </div>
                        </div>
                    </div>

                    <!-- Anexos -->
                    <div class="form-section">
                        <h3><i class="fas fa-paperclip"></i> Anexos</h3>
                        
                        <div class="upload-area" onclick="alert('Upload de imagem')">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p><strong>Clique para adicionar foto</strong></p>
                            <p style="color: var(--cinza); font-size: 12px;">PNG, JPG até 5MB</p>
                        </div>
                    </div>

                    <!-- Botões -->
                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" onclick="cancelarItem()">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar Item</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        var dadosAcesso = {
            nivel: '',
            secretarias: [],
            unidades: [],
            departamentos: [],
            responsaveis: []
        };

        function apiBaseUrl() {
            if (typeof getApiBaseUrl === 'function') {
                return getApiBaseUrl();
            }
            return '/backend/api';
        }

        function usuarioLogado() {
            try {
                return JSON.parse(sessionStorage.getItem('usuario') || '{}');
            } catch (e) {
                return {};
            }
        }

        function preencherSelect(select, itens, placeholder, textoItem) {
            select.innerHTML = '<option value="">' + placeholder + '</option>';
            itens.forEach(function (item) {
                var option = document.createElement('option');
                option.value = item.id;
                option.textContent = textoItem ? textoItem(item) : item.nome;
                select.appendChild(option);
            });
        }

        function valorPermitido(itens, valor) {
            return valor && itens.some(function (item) {
                return String(item.id) === String(valor);
            });
        }

        function definirValor(select, valor) {
            if (valor) {
                select.value = String(valor);
            }
        }

        function travarSeUnico(select, itens, travarPorContexto) {
            select.disabled = Boolean(travarPorContexto) || itens.length === 1;
            if (itens.length === 1) {
                select.value = String(itens[0].id);
            }
        }

        function unidadesDaSecretaria(secretariaId) {
            return dadosAcesso.unidades.filter(function (unidade) {
                return String(unidade.secretariaId) === String(secretariaId);
            });
        }

        function departamentosDaUnidade(unidadeId) {
            return dadosAcesso.departamentos.filter(function (departamento) {
                return String(departamento.unidadeId) === String(unidadeId);
            });
        }

        function atualizarUnidades(valorPreferido, travarPorContexto) {
            var secretariaId = document.getElementById('secretariaId').value;
            var unidadeSelect = document.getElementById('unidadeId');
            var unidades = secretariaId ? unidadesDaSecretaria(secretariaId) : [];

            preencherSelect(unidadeSelect, unidades, 'Selecione...');
            definirValor(unidadeSelect, valorPermitido(unidades, valorPreferido) ? valorPreferido : '');
            travarSeUnico(unidadeSelect, unidades, travarPorContexto);
            atualizarDepartamentos();
        }

        function atualizarDepartamentos(valorPreferido, travarPorContexto) {
            var unidadeId = document.getElementById('unidadeId').value;
            var departamentoSelect = document.getElementById('departamentoId');
            var departamentos = unidadeId ? departamentosDaUnidade(unidadeId) : [];

            preencherSelect(departamentoSelect, departamentos, 'Selecione...');
            definirValor(departamentoSelect, valorPermitido(departamentos, valorPreferido) ? valorPreferido : '');
            travarSeUnico(departamentoSelect, departamentos, travarPorContexto);
            carregarLocalizacoes();
        }

        async function carregarLocalizacoes() {
            var departamentoId = document.getElementById('departamentoId').value;
            var select = document.getElementById('localizacaoId');
            select.innerHTML = '<option value="">Nenhuma localizacao</option>';

            if (!departamentoId) {
                return;
            }

            try {
                var response = await fetch(apiBaseUrl() + '/localizacoes.php?departamentoId=' + encodeURIComponent(departamentoId));
                var data = await response.json();
                if (!data.success) {
                    return;
                }

                data.data.forEach(function (localizacao) {
                    var option = document.createElement('option');
                    option.value = localizacao.id;
                    option.textContent = localizacao.nome;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error(error);
            }
        }

        function carregarResponsaveis() {
            var select = document.getElementById('responsavelId');
            preencherSelect(select, dadosAcesso.responsaveis, 'Selecione...', function (responsavel) {
                return responsavel.nome + (responsavel.cargo ? ' - ' + responsavel.cargo : '');
            });
            travarSeUnico(select, dadosAcesso.responsaveis, false);
        }

        function aplicarContextoInicial() {
            var params = new URLSearchParams(window.location.search);
            var secretariaSelect = document.getElementById('secretariaId');
            var secretariaPreferida = params.get('secretariaId');
            var unidadePreferida = params.get('unidadeId');
            var departamentoPreferido = params.get('departamentoId');
            var travarSecretaria = valorPermitido(dadosAcesso.secretarias, secretariaPreferida);

            preencherSelect(secretariaSelect, dadosAcesso.secretarias, 'Selecione...');
            definirValor(secretariaSelect, travarSecretaria ? secretariaPreferida : '');
            travarSeUnico(secretariaSelect, dadosAcesso.secretarias, travarSecretaria);

            if (!secretariaSelect.value && dadosAcesso.secretarias.length > 0 && dadosAcesso.nivel !== 'admin') {
                secretariaSelect.value = String(dadosAcesso.secretarias[0].id);
            }

            var travarUnidade = valorPermitido(unidadesDaSecretaria(secretariaSelect.value), unidadePreferida);
            atualizarUnidades(unidadePreferida, travarUnidade);
            if (!document.getElementById('unidadeId').value) {
                var unidades = unidadesDaSecretaria(secretariaSelect.value);
                if (unidades.length > 0 && dadosAcesso.nivel !== 'admin') {
                    document.getElementById('unidadeId').value = String(unidades[0].id);
                }
            }

            var travarDepartamento = valorPermitido(departamentosDaUnidade(document.getElementById('unidadeId').value), departamentoPreferido);
            atualizarDepartamentos(departamentoPreferido, travarDepartamento);
            if (!document.getElementById('departamentoId').value) {
                var departamentos = departamentosDaUnidade(document.getElementById('unidadeId').value);
                if (departamentos.length > 0 && dadosAcesso.nivel !== 'admin') {
                    document.getElementById('departamentoId').value = String(departamentos[0].id);
                    carregarLocalizacoes();
                }
            }

            carregarResponsaveis();
        }

        async function carregarAcessoDoUsuario() {
            var usuario = usuarioLogado();
            var submit = document.querySelector('button[type="submit"]');

            try {
                var url = apiBaseUrl() + '/acesso.php';
                if (usuario.id) {
                    url += '?usuarioId=' + encodeURIComponent(usuario.id);
                }

                var response = await fetch(url);
                var data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || 'Nao foi possivel carregar o acesso do usuario.');
                }

                dadosAcesso = data.data || dadosAcesso;
                if (dadosAcesso.nivel === 'sem_acesso') {
                    if (submit) submit.disabled = true;
                    alert('Seu usuario nao possui secretaria, unidade ou departamento vinculado para cadastrar patrimonio.');
                    return;
                }

                aplicarContextoInicial();
            } catch (error) {
                console.error(error);
                if (submit) submit.disabled = true;
                alert('Erro ao carregar dados do cadastro de patrimonio:\n' + error.message);
            }
        }

        function contextoAtual() {
            return {
                secretariaId: document.getElementById('secretariaId').value,
                unidadeId: document.getElementById('unidadeId').value,
                departamentoId: document.getElementById('departamentoId').value
            };
        }

        function urlItensDoContexto() {
            var contexto = contextoAtual();
            if (!contexto.secretariaId || !contexto.unidadeId || !contexto.departamentoId) {
                return 'secretarias.html';
            }

            return 'itens.html?secretariaId=' + encodeURIComponent(contexto.secretariaId) +
                '&unidadeId=' + encodeURIComponent(contexto.unidadeId) +
                '&departamentoId=' + encodeURIComponent(contexto.departamentoId);
        }

        function cancelarItem() {
            window.location.href = urlItensDoContexto();
        }

        async function salvarItem() {
            var contexto = contextoAtual();
            var descricao = document.getElementById('descricao').value.trim();
            var tipoMaterialId = document.getElementById('tipoMaterialId').value;
            var estado = document.getElementById('estado').value;
            var responsavelId = document.getElementById('responsavelId').value;
            var botao = document.querySelector('button[type="submit"]');
            var usuario = usuarioLogado();

            if (!descricao || !tipoMaterialId || !estado || !contexto.departamentoId || !responsavelId) {
                alert('Preencha os campos obrigatorios antes de salvar.');
                return;
            }

            var payload = {
                descricao: descricao,
                marca: document.getElementById('marca').value.trim(),
                modelo: document.getElementById('modelo').value.trim(),
                numeroSerie: document.getElementById('numeroSerie').value.trim(),
                tipoMaterialId: tipoMaterialId,
                estado: estado,
                observacoes: document.getElementById('observacoes').value.trim(),
                departamentoId: contexto.departamentoId,
                localizacaoId: document.getElementById('localizacaoId').value,
                responsavelId: responsavelId,
                dataAquisicao: document.getElementById('dataAquisicao').value,
                valor: document.getElementById('valor').value,
                notaFiscal: document.getElementById('notaFiscal').value.trim(),
                usuarioId: usuario.id || null
            };

            try {
                if (botao) {
                    botao.disabled = true;
                    botao.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
                }

                var response = await fetch(apiBaseUrl() + '/itens.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                var data = await response.json();

                if (!data.success) {
                    throw new Error(data.message || 'Nao foi possivel cadastrar o item.');
                }

                alert(data.message + (data.numeroPatrimonio ? '\nPatrimonio: ' + data.numeroPatrimonio : ''));
                window.location.href = urlItensDoContexto();
            } catch (error) {
                console.error(error);
                alert('Erro ao salvar item:\n' + error.message);
            } finally {
                if (botao) {
                    botao.disabled = false;
                    botao.innerHTML = 'Salvar Item';
                }
            }
        }

        document.getElementById('secretariaId').addEventListener('change', function () {
            atualizarUnidades();
        });
        document.getElementById('unidadeId').addEventListener('change', function () {
            atualizarDepartamentos();
        });
        document.getElementById('departamentoId').addEventListener('change', carregarLocalizacoes);
        document.addEventListener('DOMContentLoaded', carregarAcessoDoUsuario);
    </script>
</body>
</html>
